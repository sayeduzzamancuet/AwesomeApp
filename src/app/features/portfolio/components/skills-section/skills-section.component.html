<section id="skills" class="skills section-offset">
  <div class="container">
    <h2 appFadeIn class="section-title">Technical Expertise</h2>
    <div class="skills-grid">
      @for (category of categories; track category.title) {
        <article appFadeIn class="skill-category">
          <h3>
            <span class="skill-icon" aria-hidden="true">{{ category.icon }}</span>
            {{ category.title }}
          </h3>
          <div class="skill-tags">
            @for (tag of category.tags; track tag) {
              <span class="skill-tag">{{ tag }}</span>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
