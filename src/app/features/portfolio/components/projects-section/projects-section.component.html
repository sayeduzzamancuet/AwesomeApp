<section id="projects" class="projects section-offset">
  <div class="container">
    <h2 appFadeIn class="section-title">Major Projects</h2>
    <div class="projects-grid">
      @for (project of projects; track project.title; let i = $index) {
        <article appFadeIn class="project-card">
          <div class="project-banner" [class]="'project-banner--' + (i + 1)">
            <div class="project-banner-grid"></div>
            <span class="project-banner-initial">{{ project.title.slice(0, 1) }}</span>
          </div>
          <div class="project-content">
            <h3 class="project-title">{{ project.title }}</h3>
            <p class="project-desc">{{ project.description }}</p>
            <div class="project-tech">
              @for (tech of project.tech; track tech) {
                <span>{{ tech }}</span>
              }
            </div>
            <div class="project-links">
              @for (highlight of project.highlights; track highlight) {
                <span class="link-text">✓ {{ highlight }}</span>
              }
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
